services:
  - type: web
    name: cyclion-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: CYCLION İletişim <onboarding@resend.dev>
      - key: ALLOWED_ORIGINS
        sync: false
